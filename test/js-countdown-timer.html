<!DOCTYPE html>
<html>
  <head>
    <title>
      Hose Test
    </title>
<!--  

      CSS section
      
-->
    <style>
/* from normalize.css */
body {
  margin: 0;
}
h1 {
  font-size: 2em;
  margin: 0.67em 0;
}
abbr[title] {
  border-bottom: none; /* 1 */
  text-decoration: underline; /* 2 */
  text-decoration: underline dotted; /* 2 */
}
b,
strong {
  font-weight: bolder;
}
button,
input,
optgroup,
select,
textarea {
  font-family: inherit; /* 1 */
  font-size: 100%; /* 1 */
  line-height: 1.15; /* 1 */
  margin: 0; /* 2 */
}
button,
[type="button"],
[type="reset"],
[type="submit"] {
  -webkit-appearance: button;
}
/* end of normalize.css */

.button {
  border: 0;
  border-radius: 1vh;
  width: 85vw;
  height: auto;
  font-size: 15vh;
  font-weight: bold;
  margin-bottom: 1vh;
  padding: 2vh 0;
  color: #fff;
  cursor: pointer;
  float: center;
}
/* (A) FONT */
#ctime, #tpick {
  font-family: sans-serif;
}
.header {
  text-align: center;
  font-weight: normal;
  margin: 5px 0 10px 0;
}

/* mute button */
#picbutton {
  float: right; 
  padding: 0 5vw 0 0; /* top right bottom left OR vertical horizontal*/
}
input#un-mute {
  display: none;
}
.mute img {
  height: 18vh;
  width: 18vw;
}
.unmute img {
  display: none;
  height: 18vh;
  width: 18vw;
}
input#un-mute:checked ~ .unmute img {
  display: initial;
}
input#un-mute:checked ~ .mute img {
  display: none;
}

/* (B) CURRENT TIME */
#ctime {
  width: 90vw;
  height: auto;
  padding: 0vh; /* top right bottom left OR vertical horizontal*/
  margin: 0 2vw;
  border-radius: 1vh;
  background: rgb(255, 0, 0);
  text-align: center;
  float: center;
}
#ctime .header {
  color: #c61d1d;
}
#ctime .square {
  display: inline-block;
  padding: 0px;
  margin: 0px;
}
#ctime .digits {
  font-size: 20vh;
  font-weight: bold;
  background: rgba(255, 255, 255, 0);
  color: #fff;
  border-radius: 5px;
}
#ctime .text {
  margin-top: 15vh;
  color: #ddd;
}

#tim_sel_div {
  width: auto;
  height: 20vh;
  background: #ffffff00;
  border-radius: 0.5vh;
}

/* (C) TIME PICKER */
#tpick {
  width: 90vw;
  height: auto;
  margin-bottom: 0vh;
  padding: 2vh 0;
  border-radius: 1vh;
  background: #f2f2f2;
  white-space: nowrap;
}
#tpick-m {
  width: 65vw;
  float: left;
  margin-top: 1vh
}
#tpick select {
  width: 60vw;
  font-size: 15vh;
  text-align-last: center;
  font-weight: bold;
  border-radius: 1vh;
  margin-left: 0;
}

#tstart {
  background: #0c9113;
}
#tstop {
  background: #ff0000;
}

#tstart:disabled {
  background: #aaa;
  color: #888;
}
#tstop:disabled {
  background: #aaa;
  color: #888;
}

    </style>

<!-- 

      javascript section
      
-->
    <script>
  var _millis = false;
  var ac = {
  // (A) INITIALIZE TIMER
  init : function () {
    // (A1) CREATE REFERENCES FOR CLOCK, MIN, SECONDS
    ac.ctime = document.getElementById("ctime");
    ac.cmin = document.getElementById("cmin");
    ac.csec = document.getElementById("csec");

    // (A2) CREATE TIME PICKER - MIN
    ac.thm = ac.createSel(10);
    document.getElementById("tpick-m").appendChild(ac.thm);
    ac.thm.addEventListener("change", ac.thmChange);
    ac.thmChange();

    // (A3) CREATE TIME PICKER - startTimer, stopTimer
    ac.tstart = document.getElementById("tstart");
    ac.tstart.addEventListener("click", ac.startTimer);
    ac.tstop = document.getElementById("tstop");
    ac.tstop.addEventListener("click", ac.stopTimer);

    // (A4) GET ALARM SOUND
    ac.sound = document.getElementById("alarm-sound");
    ac.sound.loop = false;
    
    // (A5) START THE CLOCK
    var now = new Date().getTime();
    ac.tRemain = new Date().setTime(0);
    ac.alarm = null;

    ac.un_mute = document.getElementById('un-mute');

    // FETCH the remaining time from the server in case the timer was started by someone else
//    ac.GETupdate();
    ac.tickInterval = setInterval(ac.tick, 1000);
  },

  // (B) SUPPORT FUNCTION - CREATE SELECTOR FOR HR, MIN, SEC
  createSel : function (max) {
    const choices = [10,20,30,0.1];
    var selector = document.createElement("select");
    for (let i in choices) {
      var opt = document.createElement("option");
      opt.style.direction = "rtl";
      opt.style.fontWeight = "bold";
      temp = choices[i];
      opt.value = temp;
      opt.innerHTML = temp;
      selector.appendChild(opt);
    }
    return selector
  },

  // (C) SUPPORT FUNCTION - PREPEND HR, MIN, SEC WITH 0 (IF < 10)
  padzero : function (num) {
    if (num < 10) { num = "0" + num; }
    else { num = num.toString(); }
    return num;
  },

  // (D) UPDATE CURRENT TIME
  tick : function () {
    //console.log("TICK");
    // get the time from the server
    ac.GETupdate();
    ac.updateClock(ac.tRemain);

    if (ac.timerState) 
    {
      // (D3) CHECK AND SOUND ALARM
        if (ac.tRemain <= 0) {
          if (ac.sound.paused)
          {
            if(ac.un_mute.checked) ac.sound.play();
            ac.stopTimer();
          }
        }
    }

  },

  updateClock : function (_tRemain) {
    if(_tRemain>0)
    {
    // Time calculations for minutes and seconds
    if(_millis==true)
    {
      var minutes = Math.floor((_tRemain % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((_tRemain % (1000 * 60)) / 1000);
    }
    else
    {
      var minutes = Math.floor((_tRemain % (60 * 60)) / 60);
      var seconds = Math.floor(_tRemain % 60);
    }
    var min = ac.padzero(minutes);
    var sec = ac.padzero(seconds);

    // (D2) UPDATE HTML CLOCK
    ac.cmin.innerHTML = min;
    ac.csec.innerHTML = sec;
    //ac.tRemain = _tRemain;
    //console.info("updateClock: ac.tRemain = " + ac.tRemain);
    }
  },

  // (E) startTimer 
  startTimer : function () {
    if(ac.tstart.value=="Start")
    {
      if (!ac.timerState) 
      {
        // send POST with ac.thm.value (duration in milliseconds) so the server knows to start the device
        if(_millis)
          ac.SETtRemain(ac.thm.value*60000);
        else
          ac.SETtRemain(ac.thm.value*60);
        ac.sound.pause();
      }
      ac.thm.disabled = true;
      // don't disable the button, but change it to be a +1 min button
      //ac.tstart.disabled = true;
      ac.tstart.value = "+1 min";
      ac.tstop.disabled = false;
      // green background because we should be counting down
      ac.ctime.style.backgroundColor = "green";
      ac.timerState = true;
    }
    else if(ac.tstart.value=="+1 min")
    {
      // disable tick during update to tRemain
      clearInterval(ac.tickInterval);
      console.log("tick OFF");
      // add 1 minute to whatever time is remaining
      if(_millis)
        ac.tRemain+=60000;
      else
        ac.tRemain+=60;
      ac.SETtRemain(ac.tRemain);
    }
  },

  // (F) stopTimer 
  stopTimer : function () {
    //if (!ac.sound.paused) { ac.sound.pause(); }
    ac.thm.disabled = false;
    //ac.tstart.disabled = false;
    ac.tstart.value = "Start";
    ac.tstop.disabled = true;
    ac.ctime.style.backgroundColor = "red";
    if(_millis)
      ac.SETtRupdateClockemain(ac.thm.value*60000);
    else
      ac.updateClock(ac.thm.value*60);
    // send POST with zero "0" to turn off device
    ac.SETtRemain(0);
    ac.timerState = false;
  },

  SETtRemain : async function (data) {
    var tempval;
    try {
      // disable tick during POST
      clearInterval(ac.tickInterval);
      console.log("tick OFF");
      ac.tRemain = parseInt(data);
      console.log("SETtRemain: ac.tRemain = "+ac.tRemain.toString());
      var formdata = new FormData();
      formdata.append('tRemain',data);

      //const response = await fetch('http://'+location.host+'/tRemain',{ 
      const response = await fetch('/tRemain.php',{ 
        method: 'POST',
        redirect: 'follow', // manual, *follow, error
        body: formdata // body data type must match "Content-Type" header
        });
        tempval = await response.text();
        console.log("POST response: ["+tempval+"]");
    }
    catch (error) {
      console.error(error);
    }
    // re-enable tick after POST
    ac.tickInterval = setInterval(ac.tick, 1000);
    console.log("tick ON");

  },

  GETupdate : function() {
    //fetch('http://'+location.host+'/tRemain', { method: 'GET' })
    fetch('/tRemain.php', { method: 'GET' })
      .then(response => response.text()) 
      .then(function(mydata) {
        ac.tRemain = parseInt(mydata);
        if(ac.timerState) console.info("fetch mydata = " + mydata);
        if(ac.tRemain>0 && !ac.timerState)
        {
          ac.timerState = true;
          ac.startTimer();
        }
      })
      .catch(err => console.log(err));
  },

  thmChange : function () {
    if(_millis)
      ac.updateClock(ac.thm.value*60*1000);
    else
      ac.updateClock(ac.thm.value*60); // PHP server uses seconds not milliseconds
  },

  MuteFunc: function() {
    /*alert('toggle player here');*/
  }

};

window.addEventListener("load", ac.init);
  </script>
  </head>
  <body>
    <div class='main-container' id='mainIndex'>
      <center>
        <!-- (A) CURRENT TIME -->
      <div id="ctime">
        <div class="square">
          <div class="digits" id="cmin">0</div>
        </div>
        <div class="square">
          <div class="digits">:</div>
        </div>
        <div class="square">
          <div class="digits" id="csec">00</div>
        </div>
      </div>
      <!-- (B) startTimer -->
      <div id="tpick">
        <div id="tim_sel_div">

          <div id="tpick-m"></div>

          <div id="picbutton">
            <input type="checkbox" name="un-mute" id="un-mute">
            <label for="un-mute" class="mute">
                <img src="http://upload.wikimedia.org/wikipedia/commons/3/3f/Mute_Icon.svg" alt="Mute_Icon.svg" title="Mute icon">
            </label>
            <label for="un-mute" class="unmute">
                <img src="http://upload.wikimedia.org/wikipedia/commons/2/21/Speaker_Icon.svg" alt="Speaker_Icon.svg" title="Unmute/speaker icon">
            </label>
          </div>
          
        </div>

        <div>
          <input type="button" class="button" value="Start" id="tstart"/>
        </div>

        <div>
          <input type="button" class="button" value="Stop" id="tstop" disabled/>
        </div>

      </div>
    </center>
  </div>
    <!-- (C) ALARM SOUND -->
    <audio id="alarm-sound">
      <source src="https://upload.wikimedia.org/wikipedia/commons/d/d9/Wilhelm_Scream.ogg" type="audio/ogg">
    </audio>
  </body>
</html>
